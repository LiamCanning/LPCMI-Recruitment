<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Football icon -->
  <circle cx="600" cy="240" r="80" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <polygon points="600,180 630,200 622,230 578,230 570,200" fill="#3b82f6" opacity="0.85"/>
  <line x1="570" y1="200" x2="545" y2="178" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <line x1="630" y1="200" x2="655" y2="178" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <line x1="622" y1="230" x2="648" y2="256" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <line x1="578" y1="230" x2="552" y2="256" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <line x1="600" y1="180" x2="600" y2="160" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <!-- Magnifying glass -->
  <line x1="660" y1="300" x2="700" y2="340" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" fill="#ffffff" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="64" font-weight="700" letter-spacing="-1">LPCMI <tspan fill="#3b82f6">Recruitment</tspan></text>
  <!-- Subtitle -->
  <text x="600" y="475" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="24" font-weight="400">Player Recruitment Tracking</text>
  <!-- Accent line -->
  <rect x="500" y="500" width="200" height="3" rx="2" fill="#3b82f6" opacity="0.6"/>
</svg>
